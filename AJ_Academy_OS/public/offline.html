<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c9a227" />
    <title>AJ Academy — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, Segoe UI, sans-serif;
        background: #fffdf8;
        color: #3d3428;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        background: #fff;
        border: 1px solid #e8dcc8;
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 12px 28px rgba(180, 140, 60, 0.12);
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        color: #6b5d4d;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>AJ Academy needs an internet connection. Reconnect, then refresh this page.</p>
    </div>
  </body>
</html>
